<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SafeGuide Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="form-box">
    <h2>Login to SafeGuide 🇮🇳</h2>

    <input type="text" id="phone" placeholder="Enter Phone (+91...)">
    <div id="recaptcha-container"></div>

    <button onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">

    <button onclick="verifyOTP()">Verify & Login</button>

    <p><a href="#">Become a Guide</a></p>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script src="app.js"></script>
<script>
const BASE_URL = "https://YOUR_PROJECT_ID.cloudfunctions.net/api";

async function sendOTP() {
  const phone = document.querySelector("#phone").value;

  if (!phone) {
    alert("Enter phone number");
    return;
  }

  try {
    const res = await fetch(BASE_URL + "/send-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone })
    });

    const data = await res.json();
    alert(data.message || "OTP sent");

  } catch (err) {
    alert("Error sending OTP ❌");
    console.error(err);
  }
}

async function verifyOTP() {
  const phone = document.querySelector("#phone").value;
  const otp = document.querySelector("#otp").value;

  if (!otp) {
    alert("Enter OTP");
    return;
  }

  try {
    const res = await fetch(BASE_URL + "/verify-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone, otp })
    });

    const data = await res.json();

    if (data.success) {
      alert("Login successful ✅");
    } else {
      alert("Invalid OTP ❌");
    }

  } catch (err) {
    alert("Error verifying OTP ❌");
    console.error(err);
  }
}
</script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('sendBtn');

function sendOTP() {
  const phone = document.getElementById('phone').value;

  firebase.auth().signInWithPhoneNumber(phone, window.recaptchaVerifier)
    .then((confirmationResult) => {
      window.confirmationResult = confirmationResult;
      alert("OTP sent ✅");
    });
}

function verifyOTP() {
  const code = document.getElementById('otp').value;

  confirmationResult.confirm(code).then(() => {
    alert("Login success ✅");
  }).catch(() => {
    alert("Invalid OTP ❌");
  });
}
</script>
</body>
</html>
