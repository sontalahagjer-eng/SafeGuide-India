<!DOCTYPE html>
<html>
<head>
  <title>SafeGuide India</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-page">
  <div class="overlay"></div>

  <div class="login-box">

    <p class="subtitle">
      Traveling alone? Need someone who knows everything about India.<br>
      Book a guide who will be with you till your destination.
    </p>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="guide-link">
      Or <a href="guide.html">Become a Guide</a>
    </p>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
