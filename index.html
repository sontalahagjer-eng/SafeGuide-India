s<!DOCTYPE html>
<html>
<head>
  <title>SafeGuide India</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #f4f4f4, #e0e0e0);
      text-align: center;
      margin: 0;
    }

    h1 {
      font-size: 32px;
      margin-top: 20px;
    }

    .flag {
      width: 40px;
      vertical-align: middle;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 350px;
      margin: 20px auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    input, button {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff6600;
      color: white;
      border: none;
      font-size: 16px;
    }

    .gallery img {
      width: 90%;
      max-width: 350px;
      border-radius: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

  <h1>
    Welcome to SafeGuide India 
    <img class="flag" src="https://upload.wikimedia.org/wikipedia/en/4/41/Flag_of_India.svg">
  </h1>

  <!-- LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone Number">
    <button onclick="login()">Login</button>
  </div>

  <!-- BOOKING -->
  <div class="card">
    <h3>Book a Guide</h3>
    <input id="name" placeholder="Your Name">
    <input id="city" placeholder="City (Delhi, Goa...)">
    <button onclick="book()">Book Guide</button>
  </div>
  <!-- GUIDE REGISTRATION -->
<div class="card">
  <h3>Become a Guide</h3>
  
  <input id="guideName" placeholder="Your Name">
  <input id="guideCity" placeholder="City">
  <input id="guidePhone" placeholder="Phone Number">
  
  <button onclick="registerGuide()">Register as Guide</button>
</div>
  <h3>Available Guides</h3>
<div id="guideList"></div>
<h3>All Bookings</h3>
<div id="bookingList"></div>
  <!-- IMAGES -->
  <div class="gallery">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Taj-Mahal.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/1e/Mumbai_Skyline.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/India_Gate_in_New_Delhi_03-2016.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Assam_Tea_Garden.jpg">
  </div>
</div>

const db = firebase.firestore();
  function loadGuides() {
  const list = document.getElementById("guideList");
  list.innerHTML = "";

  db.collection("guides").get().then((snapshot) => {
    snapshot.forEach((doc) => {
      let data = doc.data();

      let item = document.createElement("div");
      item.style.border = "1px solid #ccc";
      item.style.padding = "10px";
      item.style.margin = "5px";
item.innerHTML = `
👤 ${data.name} <br>
📍 ${data.city} <br>
<button onclick="selectGuide('${data.name}', '${data.city}')">Select
Guide</button>
`;

      list.appendChild(item);
    });
  });
  }
  
function loadBookings() {
  const list = document.getElementById("bookingList");
  list.innerHTML = "";

  db.collection("bookings").get().then((snapshot) => {
    snapshot.forEach((doc) => {
      let data = doc.data();

      let item = document.createElement("div");
      item.style.border = "1px solid #ccc";
      item.style.padding = "10px";
      item.style.margin = "5px";

    item.innerHTML = `
👤 ${data.user} <br>
🧭 Guide: ${data.guide} <br>
📍 ${data.city} <br><br>
<button style="background:red;" onclick="deleteBooking('${doc.id}')">Delete</button>
`;
list.appendChild(item);
});
});
}

}
