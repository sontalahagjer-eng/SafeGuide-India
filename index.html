<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeGuide India</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

/* Full screen Taj Mahal background */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1587135941948-670b381f08ce') no-repeat center center/cover;
  position: relative;
  color: white;
}

/* Dark overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* Top navbar */
.navbar {
  position: absolute;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px;
  box-sizing: border-box;
}

.logo {
  font-size: 24px;
  font-weight: bold;
}

/* Buttons */
.nav-buttons button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.book {
  background: orange;
  color: white;
}

.become {
  background: green;
  color: white;
}

/* Center content */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.content h1 {
  font-size: 40px;
}

.content p {
  font-size: 18px;
  margin-top: 10px;
}

/* Login box */
.login-box {
  margin-top: 20px;
}

.login-box input {
  padding: 10px;
  width: 200px;
  border: none;
  border-radius: 5px;
}

.login-box button {
  padding: 10px;
  background: orange;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="hero">
  <div class="overlay"></div>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">🇮🇳 SafeGuide India</div>
    <div class="nav-buttons">
      <button class="book">Book Guide</button>
      <button class="become">Become Guide</button>
    </div>
  </div>

  <!-- Center Content -->
  <div class="content">
    <h1>Welcome to SafeGuide India 🇮🇳</h1>
    <p>Explore India safely with trusted local guides</p>

    <!-- Login -->
    <div class="login-box">
      <input type="text" placeholder="Enter Phone Number">
      <button>Send OTP</button>
      <div id="recaptcha-container"></div>
      <input type="text" id="otp" placeholder="Enter OTP" style="display:none; margin-top:10px;">
<button id="verifyBtn" style="display:none; margin-top:10px;">Verify OTP</button>
    </div>
  </div>

</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script>
  // 🔥 Replace with YOUR Firebase config
  var firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);

  // Setup reCAPTCHA
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    size: 'normal'
  });

  // Send OTP
  function sendOTP() {
    var number = document.getElementById("phone").value;
    var phoneNumber = "+91" + number;

    firebase.auth().signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
      .then(function (confirmationResult) {
        window.confirmationResult = confirmationResult;

        alert("OTP Sent!");

        document.getElementById("otp").style.display = "block";
        document.getElementById("verifyBtn").style.display = "block";
      })
      .catch(function (error) {
        alert(error.message);
      });
  }

  // Verify OTP
  document.getElementById("verifyBtn").onclick = function () {
    var code = document.getElementById("otp").value;

    confirmationResult.confirm(code).then(function (result) {
      alert("Login Successful 🎉");

      // 👉 Redirect after login
      window.location.href = "home.html";

    }).catch(function (error) {
      alert("Wrong OTP ❌");
    });
  };
  </script>
</body>
</html>
