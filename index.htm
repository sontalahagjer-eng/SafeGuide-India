  <h1>
    Welcome to SafeGuide India 
    <img class="flag" src="https://upload.wikimedia.org/wikipedia/en/4/41/Flag_of_India.svg">
  </h1>

  <!-- LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone Number">
    <button onclick="loginUser()">Login</button> 

  <!-- BOOKING -->
  <div class="card">
    <h3>Book a Guide</h3>
    <input id="name" placeholder="Your Name">
    <input id="city" placeholder="City (Delhi, Goa...)">
    <button onclick="book()">Book Guide</button>
  </div>
  <!-- GUIDE REGISTRATION -->
<div class="card">
  <h3>Become a Guide</h3>
  
  <input id="guideName" placeholder="Your Name">
  <input id="guideCity" placeholder="City">
  <input id="guidePhone" placeholder="Phone Number">
  
  <button onclick="registerGuide()">Register as Guide</button>
</div>
  <h3>Available Guides</h3>
<div id="guideList"></div>
<h3>All Bookings</h3>
<div id="bookingList"></div>
  <!-- 🔥 ADD HERE (LOGIN PAGE) -->

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAvO4K5esIcGSteP_zfSX4289ZjxTfJoew",
  authDomain: "safeguide-india-27733.firebaseapp.com",
  projectId: "safeguide-india-27733",
  storageBucket: "safeguide-india-27733.appspot.com",
  messagingSenderId: "149181195290",
  appId: "1:149181195290:web:574f15afe83f573bdedda3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
  function loadGuides() {
  const list = document.getElementById("guideList");
  list.innerHTML = "";

  db.collection("guides").get().then((snapshot) => {
    snapshot.forEach((doc) => {
      let data = doc.data();

      let item = document.createElement("div");
      item.style.border = "1px solid #ccc";
      item.style.padding = "10px";
      item.style.margin = "5px";

item.innerHTML = `
<img src="${data.image}" style="width:100%; height:150px; object-fit:cover; border-radius:10px;"><br><br>

<h3>${data.name}</h3>
<p>📍 ${data.city}</p>

<button onclick="selectGuide('${data.name}', '${data.city}')"
style="background:green; color:white; padding:8px; border:none; border-radius:5px;">
Select Guide
</button>
`;

      list.appendChild(item);
    });
  });
  }
  
function loadBookings() {
  const list = document.getElementById("bookingList");
  list.innerHTML = "";

  db.collection("bookings").get().then((snapshot) => {
    snapshot.forEach((doc) => {
      let data = doc.data();
      item.style.boxShadow = "0 2px 10px rgba(0,0,0,0.2)";
item.style.borderRadius = "10px";
item.style.overflow = "hidden";
item.style.background = "#fff";
      let item = document.createElement("div");
      item.style.border = "1px solid #ccc";
      item.style.padding = "10px";
      item.style.margin = "5px";

    item.innerHTML = `
👤 ${data.user} <br>
🧭 Guide: ${data.guide} <br>
📍 ${data.city} <br><br>
<button style="background:red;" onclick="deleteBooking('${doc.id}')">Delete</button>
`;
list.appendChild(item);
});
});
}

}

function deleteBooking(id) {
  db.collection("bookings").doc(id).delete().then(() => {
    loadBookings();
  });
}
  function loginUser() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  }
  </script>
