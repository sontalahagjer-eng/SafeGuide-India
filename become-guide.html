<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Become a Guide</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://upload.wikimedia.org/wikipedia/commons/6/6f/Statue_of_Unity.jpg') no-repeat center center/cover;
  }

  /* Blur overlay */
  body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(6px);
    background: rgba(0,0,0,0.4);
    z-index: -1;
  }

  .container {
    max-width: 400px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
  }

  h2 {
    text-align: center;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 6px;
    background: green;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  .otp-box {
    display: flex;
    gap: 5px;
  }

  .otp-box input {
    flex: 1;
  }

  .small-btn {
    width: auto;
    background: orange;
  }

  .countdown {
    font-size: 12px;
    color: red;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Become a Guide</h2>

  <!-- Name -->
  <input type="text" placeholder="Full Name (as PAN Card)" required>

  <!-- PAN Upload -->
  <label>Upload PAN Card</label>
  <input type="file">

  <!-- Aadhaar Upload Option -->
  <label>Upload Aadhaar Card</label>
  <input type="file">

  <!-- Aadhaar Number + Verify -->
  <input type="text" id="aadhaar" placeholder="Enter Aadhaar Number">

  <div class="otp-box">
    <input type="text" id="otp" placeholder="Enter OTP">
    <button class="small-btn" onclick="sendOTP()">Verify</button>
  </div>

  <div class="countdown" id="timer"></div>

  <br>

  <button>Submit Application</button>
</div>

<script>
let countdown = 0;
let interval;

function sendOTP() {
  if (countdown > 0) return;

  alert("OTP sent successfully!");

  countdown = 30;
  document.getElementById("timer").innerText = "Resend OTP in 30s";

  interval = setInterval(() => {
    countdown--;
    document.getElementById("timer").innerText = "Resend OTP in " + countdown + "s";

    if (countdown <= 0) {
      clearInterval(interval);
      document.getElementById("timer").innerText = "You can resend OTP now";
    }
  }, 1000);
}
</script>

</body>
</html>
